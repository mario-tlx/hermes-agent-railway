<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Authenticator — Hermes Agent</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = { darkMode: 'class' };
    if (window.matchMedia('(prefers-color-scheme: dark)').matches) {
      document.documentElement.classList.add('dark');
    }
  </script>
</head>
<body class="bg-gray-50 text-gray-900 dark:bg-gray-950 dark:text-gray-100 min-h-screen flex items-center justify-center px-4">
  <div class="w-full max-w-md bg-white dark:bg-gray-900 border border-gray-200 dark:border-gray-800 rounded-xl shadow-sm p-8">
    <h1 class="text-xl font-semibold tracking-tight mb-1">Two-factor authentication</h1>
    <p class="text-sm text-gray-500 dark:text-gray-400 mb-4">
      Add this account in Microsoft Authenticator (or any TOTP app): scan the QR code, then enter the 6-digit code.
    </p>
    <p class="text-xs text-gray-500 mb-4 font-mono break-all">{{ issuer }} ({{ account }})</p>
    <div class="flex justify-center mb-6 p-4 bg-white dark:bg-gray-950 rounded-lg border border-gray-200 dark:border-gray-800">
      <img src="/totp/qr.png" alt="QR code for authenticator setup" width="200" height="200" class="w-48 h-48">
    </div>
    {% if error %}
    <p class="text-sm text-red-600 dark:text-red-400 mb-4">Invalid code. Check the time on your phone and try again.</p>
    {% endif %}
    <form method="post" action="/totp" class="space-y-4">
      <div>
        <label class="block text-xs text-gray-500 mb-1">6-digit code</label>
        <input type="text" name="code" inputmode="numeric" pattern="[0-9]*" maxlength="8" autocomplete="one-time-code" autofocus
               class="w-full bg-gray-100 dark:bg-gray-800 border border-gray-300 dark:border-gray-700 rounded-lg px-3 py-2 text-sm font-mono tracking-widest focus:outline-none focus:ring-1 focus:ring-blue-500" required>
      </div>
      <button type="submit" class="w-full py-2.5 bg-blue-600 hover:bg-blue-500 text-white rounded-lg text-sm font-medium transition">
        Verify and sign in
      </button>
    </form>
    <p class="text-xs text-gray-400 mt-4 text-center">
      <a href="/login" class="text-blue-600 dark:text-blue-400 hover:underline">Back to password</a>
    </p>
  </div>
</body>
</html>
